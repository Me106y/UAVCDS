<svg width="120" height="40" viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="droneGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="20" cy="20" r="18" fill="url(#logoGradientDark)" opacity="0.2"/>
  
  <!-- 无人机主体 -->
  <g transform="translate(8, 8)">
    <!-- 无人机中心 -->
    <rect x="10" y="10" width="4" height="4" rx="2" fill="url(#droneGradientDark)"/>
    
    <!-- 四个螺旋桨臂 -->
    <line x1="12" y1="12" x2="6" y2="6" stroke="url(#droneGradientDark)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="12" x2="18" y2="6" stroke="url(#droneGradientDark)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="12" x2="6" y2="18" stroke="url(#droneGradientDark)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="12" x2="18" y2="18" stroke="url(#droneGradientDark)" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- 四个螺旋桨 -->
    <circle cx="6" cy="6" r="2" fill="none" stroke="url(#droneGradientDark)" stroke-width="1" opacity="0.8"/>
    <circle cx="18" cy="6" r="2" fill="none" stroke="url(#droneGradientDark)" stroke-width="1" opacity="0.8"/>
    <circle cx="6" cy="18" r="2" fill="none" stroke="url(#droneGradientDark)" stroke-width="1" opacity="0.8"/>
    <circle cx="18" cy="18" r="2" fill="none" stroke="url(#droneGradientDark)" stroke-width="1" opacity="0.8"/>
  </g>
  
  <!-- 航线路径 -->
  <g transform="translate(45, 10)">
    <path d="M0 10 Q10 0 20 10 T40 10 Q50 20 60 10" 
          fill="none" 
          stroke="url(#logoGradientDark)" 
          stroke-width="2" 
          stroke-linecap="round" 
          opacity="0.8"/>
    
    <!-- 航点 -->
    <circle cx="0" cy="10" r="2" fill="url(#logoGradientDark)"/>
    <circle cx="20" cy="10" r="2" fill="url(#logoGradientDark)"/>
    <circle cx="40" cy="10" r="2" fill="url(#logoGradientDark)"/>
    <circle cx="60" cy="10" r="2" fill="url(#logoGradientDark)"/>
  </g>
  
  <!-- 文字标识 -->
  <text x="45" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600" fill="url(#logoGradientDark)">
    DJI MCP
  </text>
</svg>