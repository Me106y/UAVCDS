<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- 占位符图标 -->
  <g transform="translate(200, 150)">
    <circle r="40" fill="#e2e8f0"/>
    <g transform="translate(-15, -15)">
      <!-- 简化的无人机图标 -->
      <rect x="12" y="12" width="6" height="6" rx="1" fill="#94a3b8"/>
      <line x1="15" y1="15" x2="8" y2="8" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
      <line x1="15" y1="15" x2="22" y2="8" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
      <line x1="15" y1="15" x2="8" y2="22" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
      <line x1="15" y1="15" x2="22" y2="22" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
      <circle cx="8" cy="8" r="2" fill="none" stroke="#94a3b8" stroke-width="1"/>
      <circle cx="22" cy="8" r="2" fill="none" stroke="#94a3b8" stroke-width="1"/>
      <circle cx="8" cy="22" r="2" fill="none" stroke="#94a3b8" stroke-width="1"/>
      <circle cx="22" cy="22" r="2" fill="none" stroke="#94a3b8" stroke-width="1"/>
    </g>
  </g>
  
  <text x="200" y="220" text-anchor="middle" font-family="system-ui" font-size="14" fill="#64748b">图片加载中...</text>
  <text x="200" y="240" text-anchor="middle" font-family="system-ui" font-size="12" fill="#94a3b8">Image Loading...</text>
